; -----------------------------------------------
; Production PHP settings
; -----------------------------------------------

; Error reporting — suppress display, log only
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL
log_errors = On
error_log = /dev/stderr

; Limits
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
post_max_size = 100M
upload_max_filesize = 100M

; Date
date.timezone = UTC

; Session
session.gc_maxlifetime = 14400

; Security
expose_php = Off
allow_url_fopen = On